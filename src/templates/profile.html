<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; }
        .profile-avatar { width:96px; height:96px; border-radius:50%; object-fit:cover; }
    </style>
</head>
<body class="bg-dark text-white">
    <div class="container mt-4">
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mb-3">Back to Dashboard</a>
        <div class="card bg-light text-dark">
            <div class="card-body d-flex">
                <img src="{{ user.avatar }}" class="rounded-circle me-3 profile-avatar" width="96" height="96">
                <div>
                    <h3>{{ user.name }}</h3>
                    <p class="mb-1"><strong>Role:</strong> {{ user.role }}</p>
                    <p class="mb-1"><strong>Email:</strong> {{ user.email }}</p>
                    <p class="mb-1"><strong>Phone:</strong> {{ user.phone }}</p>
                    <p class="mb-1"><strong>Status:</strong> {{ user.status }}</p>
                </div>
            </div>
        </div>
        {% if session.role == 'Admin' %}
        <div class="mt-3">
            <form method="post" action="{{ url_for('restrict_user', user_id=user.id) }}" style="display:inline-block;">
                <button class="btn btn-warning">Restrict</button>
            </form>
            <form method="post" action="{{ url_for('block_user', user_id=user.id) }}" style="display:inline-block;">
                <button class="btn btn-danger">Block</button>
            </form>
            <form method="post" action="{{ url_for('unblock_user', user_id=user.id) }}" style="display:inline-block;">
                <button class="btn btn-success">Unblock</button>
            </form>
            <form method="post" action="{{ url_for('set_role', user_id=user.id) }}" style="display:inline-block;">
                <select name="role" class="form-select d-inline-block" style="width:auto;">
                    <option value="Analyst">Analyst</option>
                    <option value="Admin">Admin</option>
                    <option value="User">User</option>
                </select>
                <button class="btn btn-secondary">Set Role</button>
            </form>
        </div>
        {% endif %}
    </div>
</body>
</html>
